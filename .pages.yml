media:
  input: public/images/excerpts
  output: /images/excerpts

content:
  - name: excerpts
    label: Writing Previews
    type: collection
    path: content/excerpts
    filename:
      template: "{primary}.json"
      field: create
    view:
      fields: [thumbnail, title, type, order, published]
      primary: title
      sort: [order, title]
      default:
        sort: order
        order: asc
    fields:
      - name: id
        label: Stable ID
        type: string
        required: true
        description: A permanent lowercase identifier such as the-standing-watch.
      - name: title
        label: Title
        type: string
        required: true
      - name: type
        label: Form
        type: select
        required: true
        options:
          values:
            - name: Essay
              label: Essay
            - name: Reflection
              label: Reflection
            - name: Poem
              label: Poem
      - name: caption
        label: Subtitle
        type: text
        required: true
      - name: readTime
        label: Reading time
        type: string
        required: true
        default: 3 min read
      - name: tags
        label: Themes
        type: string
        list: true
        required: true
      - name: artwork
        label: Full artwork
        type: image
        required: true
        options:
          extensions: [jpg, jpeg, png, webp]
          rename: true
      - name: artworkAlt
        label: Artwork description
        type: text
        required: true
      - name: thumbnail
        label: Navigation thumbnail
        type: image
        required: true
        description: Use a text-free image that remains legible at a small size.
        options:
          extensions: [jpg, jpeg, png, webp]
          rename: true
      - name: body
        label: Preview text
        type: text
        required: true
      - name: pagePublished
        label: Publish full writing page
        type: boolean
        default: false
        description: Creates a public, indexable page for the complete piece.
      - name: fullBody
        label: Full piece
        type: text
        description: The complete essay, reflection, or poem. Paragraph breaks are preserved.
      - name: beforeReading
        label: Before reading
        type: text
        description: A brief orientation that defines the scope of the piece without explaining it away.
      - name: origin
        label: Where this story came from
        type: text
      - name: meaning
        label: What it means for me
        type: text
      - name: recognitionIds
        label: Selected recognition IDs
        type: number
        list: true
        description: IDs from the reader recognition archive to show beneath this piece.
      - name: seoTitle
        label: Search and sharing title
        type: string
        description: Aim for roughly 50 to 60 characters.
      - name: seoDescription
        label: Search and sharing description
        type: text
        description: Aim for roughly 140 to 160 characters.
      - name: socialImage
        label: Social sharing image
        type: image
        description: A wide image is best for Facebook, LinkedIn, and other previews.
        options:
          extensions: [jpg, jpeg, png, webp]
          rename: true
      - name: order
        label: Display order
        type: number
        required: true
        default: 1
      - name: published
        label: Show on website
        type: boolean
        default: true

settings:
  hide: true
