    <title>Jonathan Lyon — email signature</title>
    <!--
      Narrative Witness · Apple Mail / multi-client signature

      The pen-stroke drawing is full width of the signature column (520px),
      tightly cropped and resized so Mail "Actual Size" does not blow up empty canvas.

      Install (Apple Mail):
      1. Deploy so this loads: https://www.thenarrativewitness.com/images/email/witness-thread-drawing.png
      2. Open this file in Safari → select the signature block only → Copy
      3. Mail → Settings → Signatures → paste
      4. In compose, set Image Size to "Actual Size" or "Large" after re-paste if needed
      5. Uncheck “Always match my default message font” if Mail rewrites type
    -->
  </head>

      cellpadding="0"
      cellspacing="0"
      border="0"

        mso-table-lspace: 0pt;
        mso-table-rspace: 0pt;
        font-family: Georgia, 'Times New Roman', Times, serif;
        font-size: 14px;
        line-height: 1.45;
        color: #3b3835;
      "
    >

            role="presentation"
            cellpadding="0"
            cellspacing="0"
            border="0"

              mso-table-lspace: 0pt;
              mso-table-rspace: 0pt;
              width: 100%;
              max-width: 520px;
            "
          >
            <!-- Full-width pen stroke → writer (column width, no empty canvas) -->
            <tr>
              <td
                align="left"
                style="padding: 0 0 12px 0; line-height: 0; font-size: 0; mso-line-height-rule: exactly;"
              >
                <a

                  target="_blank"
                  rel="noopener noreferrer"
                  style="text-decoration: none; border: 0; display: block; line-height: 0;"
                >
                  <!-- Intrinsic file is 520×121; attributes match so "Actual Size" stays correct -->
                  <img
                    src="https://www.thenarrativewitness.com/images/email/witness-thread-drawing.png?v=2"
                    alt="The Narrative Witness — pen stroke into a drawing of a writer at work"
                    width="520"
                    height="121"
                    style="
                      display: block;
                      border: 0;
                      outline: none;
                      text-decoration: none;
                      width: 520px;
                      max-width: 100%;
                      height: auto;
                      -ms-interpolation-mode: bicubic;
                    "
                  />

              </td>
            </tr>

            <!-- Identity + contact under the drawing -->
            <tr>

                <table
