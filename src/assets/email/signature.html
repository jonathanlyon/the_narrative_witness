<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Jonathan Lyon — email signature</title>
    <!--
      Narrative Witness · email signature

      One table, one column, no align="left" on sibling tables (that floated
      blocks side-by-side in Safari and scrambled Mail).

      Install:
      1. Open this file in Safari and hard-refresh (Cmd+Shift+R)
      2. You should see: drawing on TOP, then name, rule, contact — all stacked left
      3. Select from the drawing through the cabin line → Copy
      4. Mail → Settings → Signatures → Cmd+A → Delete → Paste
      5. Uncheck “Always match my default message font”
      6. Quit Mail (Cmd+Q), reopen, new message
    -->
  </head>
  <body style="margin: 0; padding: 16px; background: #ffffff;">
    <table
      role="presentation"
      cellpadding="0"
      cellspacing="0"
      border="0"
      width="520"
      style="
        border-collapse: collapse;
        mso-table-lspace: 0pt;
        mso-table-rspace: 0pt;
        width: 520px;
        font-family: Georgia, 'Times New Roman', Times, serif;
        font-size: 14px;
        line-height: 1.4;
        color: #3b3835;
      "
    >
      <!-- Width lock -->
      <tr>
        <td style="padding: 0; line-height: 0; font-size: 0; height: 1px;">
          <img
            src="https://www.thenarrativewitness.com/images/email/spacer-520.png"
            width="520"
            height="1"
            alt=""
            border="0"
            style="display: block; width: 520px; height: 1px; border: 0;"
          />
        </td>
      </tr>

      <!-- Drawing -->
      <tr>
        <td style="padding: 0 0 16px 0; line-height: 0; font-size: 0;">
          <a
            href="https://www.thenarrativewitness.com"
            target="_blank"
            rel="noopener noreferrer"
            style="text-decoration: none; border: 0;"
          >
            <img
              src="https://www.thenarrativewitness.com/images/email/witness-thread-drawing.png?v=3"
              alt="The Narrative Witness — pen stroke into a drawing of a writer at work"
              width="520"
              height="121"
              border="0"
              style="
                display: block;
                border: 0;
                outline: none;
                width: 520px;
                height: 121px;
                -ms-interpolation-mode: bicubic;
              "
            />
          </a>
        </td>
      </tr>

      <!-- Name / book -->
      <tr>
        <td
          style="
            padding: 0 0 12px 0;
            font-family: Georgia, 'Times New Roman', Times, serif;
            color: #3b3835;
          "
        >
          <p
            style="
              margin: 0;
              padding: 0;
              font-size: 18px;
              line-height: 22px;
              mso-line-height-rule: exactly;
              color: #2f2c29;
              font-family: Georgia, 'Times New Roman', Times, serif;
            "
          >
            Jonathan Lyon
          </p>
          <p
            style="
              margin: 8px 0 0 0;
              padding: 0;
              font-size: 12px;
              line-height: 16px;
              mso-line-height-rule: exactly;
              color: #7b746d;
              font-style: italic;
              font-family: Georgia, 'Times New Roman', Times, serif;
            "
          >
            Author of
          </p>
          <p
            style="
              margin: 2px 0 0 0;
              padding: 0;
              font-size: 15px;
              line-height: 20px;
              mso-line-height-rule: exactly;
              color: #3b3835;
              font-style: italic;
              font-family: Georgia, 'Times New Roman', Times, serif;
            "
          >
            We the Unkept
          </p>
          <p
            style="
              margin: 10px 0 0 0;
              padding: 0;
              font-size: 10px;
              line-height: 14px;
              mso-line-height-rule: exactly;
              letter-spacing: 0.12em;
              text-transform: uppercase;
              color: #8b837b;
              font-family: Georgia, 'Times New Roman', Times, serif;
            "
          >
            The Narrative Witness
          </p>
        </td>
      </tr>

      <!-- Rule -->
      <tr>
        <td style="padding: 0 0 12px 0; line-height: 0; font-size: 0;">
          <table
            role="presentation"
            cellpadding="0"
            cellspacing="0"
            border="0"
            width="520"
            style="border-collapse: collapse; width: 520px;"
          >
            <tr>
              <td
                style="
                  border-top: 1px solid #d8d3ce;
                  font-size: 0;
                  line-height: 0;
                  height: 1px;
                  mso-line-height-rule: exactly;
                "
              >
                &nbsp;
              </td>
            </tr>
          </table>
        </td>
      </tr>

      <!-- Contact -->
      <tr>
        <td
          style="
            padding: 0;
            font-family: Georgia, 'Times New Roman', Times, serif;
            color: #3b3835;
          "
        >
          <p
            style="
              margin: 0;
              padding: 0;
              font-size: 13px;
              line-height: 20px;
              mso-line-height-rule: exactly;
              font-family: Georgia, 'Times New Roman', Times, serif;
            "
          >
            <a
              href="mailto:jonathan@thenarrativewitness.com"
              style="color: #3b3835; text-decoration: none;"
              >jonathan@thenarrativewitness.com</a
            >
          </p>
          <p
            style="
              margin: 0;
              padding: 0;
              font-size: 13px;
              line-height: 20px;
              mso-line-height-rule: exactly;
              font-family: Georgia, 'Times New Roman', Times, serif;
            "
          >
            <a href="tel:+64266000006" style="color: #3b3835; text-decoration: none;"
              >(+64) 026 600 0006</a
            >
          </p>
          <p
            style="
              margin: 0;
              padding: 0;
              font-size: 13px;
              line-height: 20px;
              mso-line-height-rule: exactly;
              font-family: Georgia, 'Times New Roman', Times, serif;
            "
          >
            <a
              href="https://www.thenarrativewitness.com"
              target="_blank"
              rel="noopener noreferrer"
              style="color: #3b3835; text-decoration: none;"
              >www.thenarrativewitness.com</a
            >
          </p>
          <p
            style="
              margin: 10px 0 0 0;
              padding: 0;
              font-size: 12px;
              line-height: 16px;
              mso-line-height-rule: exactly;
              color: #8b837b;
              font-style: italic;
              font-family: Georgia, 'Times New Roman', Times, serif;
            "
          >
            Writing from a cabin in rural New Zealand.
          </p>
        </td>
      </tr>
    </table>
  </body>
</html>
