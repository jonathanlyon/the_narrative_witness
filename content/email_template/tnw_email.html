<style>
/* The Narrative Witness — Kit HTML layout shell (Classic base, brand palette) */
/* Paste into: Kit → Email Templates → Create HTML Template */
/* Required: {{ message_content }}, unsubscribe, {{ address }} */

.message-content {
  max-width: 600px;
  margin: 30px auto;
  font-family: Georgia, "Times New Roman", Times, serif;
  background: #f4f1ee;
  padding: 28px 24px 20px;
  box-sizing: border-box;
}

.message-content div {
  padding-bottom: 10px;
}

.message-content img {
  max-width: 100%;
  height: auto;
  display: block;
}

* {
  font-family: Georgia, "Times New Roman", Times, serif;
}

h1,
h2,
h3,
h4,
h5,
h6 {
  color: #1a1a1a;
  font-weight: normal;
  line-height: 1.25em;
  margin: 0 0 0.6em 0;
}

h1 {
  font-size: 30px;
  letter-spacing: -0.01em;
}

h2 {
  font-size: 22px;
}

h3 {
  font-size: 18px;
}

p,
li,
ul,
ol,
div {
  font-size: 17px;
  line-height: 1.65em;
  font-family: Georgia, "Times New Roman", Times, serif;
  color: #333333;
}

p *,
li * {
  color: inherit;
  font-family: inherit;
  font-size: inherit;
}

p,
ul,
ol {
  margin-bottom: 1em;
}

blockquote {
  border-left: solid 3px #d1c9be;
  margin: 22px 0;
  padding: 4px 0 4px 22px;
  font-size: 18px;
  line-height: 1.55em;
  font-style: italic;
  color: #3b3835;
  font-family: Georgia, "Times New Roman", Times, serif;
}

a {
  text-decoration: none;
  border-bottom: 1px solid #d1c9be;
  color: #1a1a1a;
}

a:hover {
  color: #6e6a64;
  border-bottom-color: #6e6a64;
}

.button {
  border: none !important;
  background: #1a1a1a;
  color: #f4f1ee !important;
  padding: 14px 22px;
  display: inline-block;
  margin: 12px 0;
  font-family: Helvetica, Arial, sans-serif !important;
  font-size: 11px !important;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  font-weight: 500;
  -webkit-border-radius: 0;
  -moz-border-radius: 0;
  border-radius: 0;
  border-bottom: none !important;
  text-decoration: none !important;
}

.button:hover {
  color: #f4f1ee !important;
  background: #6e6a64;
}

.button-secondary {
  border: 1px solid #1a1a1a !important;
  background: transparent;
  color: #1a1a1a !important;
  padding: 13px 20px;
  display: inline-block;
  margin: 12px 0;
  font-family: Helvetica, Arial, sans-serif !important;
  font-size: 11px !important;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  border-radius: 0;
  text-decoration: none !important;
}

.label {
  font-family: Helvetica, Arial, sans-serif !important;
  font-size: 10px !important;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: #6e6a64;
  margin: 0 0 12px 0;
}

.rule {
  border: 0;
  border-top: 1px solid #d1c9be;
  margin: 28px 0;
}

.footer {
  border-top: 1px solid #d1c9be;
  padding: 22px 0 8px;
  font-family: Helvetica, Arial, sans-serif;
  color: #8b837b;
  font-size: 12px;
  line-height: 1.5em;
}

.footer a {
  color: #6e6a64;
  border-bottom: none;
  font-family: Helvetica, Arial, sans-serif;
  font-size: 12px;
}

.social-links {
  margin-bottom: 10px;
  padding: 0;
}

.social-links a {
  text-align: center;
  padding: 5px;
  border: none;
}
